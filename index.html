<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>AI Тренер | Симулятор Педагога</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');
      
      html, body {
        height: 100dvh;
        width: 100%;
        margin: 0;
        padding: 0;
        background: #0A0B1A;
        color: #f8fafc;
        font-family: 'Inter', sans-serif;
        overscroll-behavior: none;
      }
      #root {
        height: 100dvh;
        width: 100%;
        display: flex;
        flex-direction: column;
        background: #0A0B1A;
      }
      
      .custom-scroll {
        overflow-y: auto !important;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: thin;
        scrollbar-color: rgba(59, 130, 246, 0.3) transparent;
      }
      
      .custom-scroll::-webkit-scrollbar { width: 6px; }
      .custom-scroll::-webkit-scrollbar-track { background: transparent; }
      .custom-scroll::-webkit-scrollbar-thumb { 
        background: rgba(59, 130, 246, 0.3); 
        border-radius: 10px;
      }
      .custom-scroll::-webkit-scrollbar-thumb:hover { 
        background: rgba(59, 130, 246, 0.5); 
      }
      
      /* Скрытый скроллбар но скролл работает */
      .no-scrollbar {
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      
      /* Улучшенный тач-скролл для iOS */
      .touch-scroll {
        -webkit-overflow-scrolling: touch;
        overflow-y: auto;
        overscroll-behavior-y: contain;
      }

      .glass {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      @media print {
        body, html, #root { overflow: visible !important; height: auto !important; }
        .print\:hidden { display: none !important; }
      }

      @keyframes analysis-glow {
        0%, 100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.1); }
        50% { box-shadow: 0 0 40px rgba(59, 130, 246, 0.3); }
      }
      .animate-analysis { animation: analysis-glow 4s infinite ease-in-out; }
    </style>

</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
